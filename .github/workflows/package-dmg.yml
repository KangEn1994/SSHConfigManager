name: Package macOS DMG

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  package-dmg:
    runs-on: macos-14
    permissions:
      contents: read
    env:
      APP_NAME: ${{ vars.APP_NAME != '' && vars.APP_NAME || 'SSHConfigManagerGUI' }}
      VERSION: ${{ vars.VERSION != '' && vars.VERSION || '0.1.3' }}
      PRODUCT_NAME: ${{ vars.PRODUCT_NAME != '' && vars.PRODUCT_NAME || 'SSH Config Manager' }}
      BUNDLE_ID: ${{ vars.BUNDLE_ID != '' && vars.BUNDLE_ID || 'dev.sshconfigmanager.gui' }}
      MIN_MACOS_VERSION: ${{ vars.MIN_MACOS_VERSION != '' && vars.MIN_MACOS_VERSION || '14.0' }}
      NOTARIZE: ${{ vars.NOTARIZE != '' && vars.NOTARIZE || 'true' }}
      FEISHU_ENABLE: ${{ vars.FEISHU_ENABLE != '' && vars.FEISHU_ENABLE || 'false' }}
      SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
      SIGNING_CERT_BASE64: ${{ secrets.SIGNING_CERT_BASE64 }}
      SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      FEISHU_BOT_SECRET: ${{ secrets.FEISHU_BOT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show packaging mode
        run: |
          if [ -n "${SIGNING_IDENTITY}" ]; then
            echo "Developer ID signing enabled."
          else
            echo "Developer ID signing not configured; ad-hoc signing will be used."
          fi
          echo "APP_NAME=${APP_NAME}"
          echo "VERSION=${VERSION}"
          echo "PRODUCT_NAME=${PRODUCT_NAME}"
          echo "BUNDLE_ID=${BUNDLE_ID}"
          echo "MIN_MACOS_VERSION=${MIN_MACOS_VERSION}"
          echo "NOTARIZE=${NOTARIZE}"

      - name: Build and package DMG
        run: |
          chmod +x scripts/package_macos_dmg.sh
          ./scripts/package_macos_dmg.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sshcm-dmg-${{ env.VERSION }}
          path: |
            dist/*.dmg
            dist/*.app
          if-no-files-found: error

      - name: Notify Feishu (Always)
        if: ${{ always() && env.FEISHU_ENABLE == 'true' && env.FEISHU_WEBHOOK_URL != '' }}
        env:
          JOB_STATUS: ${{ job.status }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          REPO_URL="https://github.com/${REPO}"
          ARTIFACT_URL="${RUN_URL}#artifacts"
          DOWNLOAD_URL="${ARTIFACT_URL}"
          SHORT_SHA="${SHA:0:7}"

          if [ "${JOB_STATUS}" = "success" ]; then
            STATUS_TEXT="构建成功"
            STATUS_COLOR="green"
          else
            STATUS_TEXT="构建失败"
            STATUS_COLOR="red"
          fi

          CARD_JSON=$(cat <<EOF
          {
            "msg_type": "interactive",
            "card": {
              "config": {
                "wide_screen_mode": true
              },
              "header": {
                "template": "${STATUS_COLOR}",
                "title": {
                  "tag": "plain_text",
                  "content": "SSHConfigManager DMG ${STATUS_TEXT}"
                }
              },
              "elements": [
                {
                  "tag": "div",
                  "text": {
                    "tag": "lark_md",
                    "content": "**仓库**: [${REPO}](${REPO_URL})\\n**分支**: ${REF_NAME}\\n**版本**: ${VERSION}\\n**提交**: ${SHORT_SHA}\\n**公证**: ${NOTARIZE}\\n**下载链接**: [点击下载构建产物](${DOWNLOAD_URL})"
                  }
                },
                {
                  "tag": "action",
                  "actions": [
                    {
                      "tag": "button",
                      "text": {
                        "tag": "plain_text",
                        "content": "查看构建日志"
                      },
                      "type": "primary",
                      "url": "${RUN_URL}"
                    },
                    {
                      "tag": "button",
                      "text": {
                        "tag": "plain_text",
                        "content": "下载构建产物"
                      },
                      "url": "${DOWNLOAD_URL}"
                    },
                    {
                      "tag": "button",
                      "text": {
                        "tag": "plain_text",
                        "content": "打开 GitHub 仓库"
                      },
                      "url": "${REPO_URL}"
                    }
                  ]
                }
              ]
            }
          }
          EOF
          )

          if [ -n "${FEISHU_BOT_SECRET:-}" ]; then
            TIMESTAMP=$(date +%s)
            SIGN=$(printf "%s\n%s" "${TIMESTAMP}" "${FEISHU_BOT_SECRET}" | openssl dgst -sha256 -hmac "${FEISHU_BOT_SECRET}" -binary | base64)
            curl -sS -X POST "${FEISHU_WEBHOOK_URL}" \
              -H "Content-Type: application/json" \
              -d "$(printf '%s' "${CARD_JSON}" | python3 -c 'import json,sys; p=json.load(sys.stdin); p["timestamp"]="'"${TIMESTAMP}"'"; p["sign"]="'"${SIGN}"'"; print(json.dumps(p, ensure_ascii=False))')"
          else
            curl -sS -X POST "${FEISHU_WEBHOOK_URL}" \
              -H "Content-Type: application/json" \
              -d "${CARD_JSON}"
          fi
